name: Deploy Quartz site to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:  # 배포 flake 시 gh workflow run deploy.yml 로 수동 재실행 (재시도 불가 상황 대비)

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false  # 직렬 큐잉으로 배포 충돌 회피 + 실패해도 재시도 가능 (cancel-in-progress:true는 배포 중 취소로 "재시도 불가" 유발)

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0 # Fetch all history for git info (last-modified dates)
      - uses: actions/setup-node@v6
        with:
          node-version: 22
      - name: Install Dependencies
        run: npm ci || (echo "retry npm ci" && sleep 5 && npm ci)
      - name: Install Quartz plugins
        run: npx quartz plugin install || (echo "retry plugin install" && sleep 5 && npx quartz plugin install)
      - name: Sanitize Korean markdown (CJK 렌더링 깨짐 자동 교정)
        run: node scripts/fix-korean-markdown.mjs
      - name: Build Quartz
        run: npx quartz build
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: public

  deploy:
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
